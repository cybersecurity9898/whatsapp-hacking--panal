        const blacklistedTexts = [

          "Awesome! Let's discuss this tomorrow.",
          "Received! Thanks for sending it over.",
          "Haha, nice one! 😂",
          "Can you send me the link?"
        ];
        
        return rawChats.map(chat => ({
          ...chat,
          messages: chat.messages ? chat.messages.filter(m => !blacklistedTexts.includes(m.text)) : []
        }));
      });

      const [myProfile, setMyProfile] = useState(() => {

        return saved ? JSON.parse(saved) : MOCK_STATUSES;

        return localStorage.getItem('wa_is_logged_in') === 'true';

      const [currentDateTime, setCurrentDateTime] = useState('');
      const [menuDropdownOpen, setMenuDropdownOpen] = useState(false);
      const [hackingAlertOpen, setHackingAlertOpen] = useState(false);
      const [isLoggingIn, setIsLoggingIn] = useState(false);
      const [showSuccessPopup, setShowSuccessPopup] = useState(false);
      const [sidebarTab, setSidebarTab] = useState('chats'); // 'chats' | 'status' | 'communities' | 'calls'

      const [isRecording, setIsRecording] = useState(false);

          setMenuDropdownOpen(false);

        window.addEventListener('click', handleOutsideClick);

          if (activeChat.unread > 0) {

                            ))
                        ) : (
                          <p className="text-xs text-waMuted text-center p-4">Type words above to filter messages in this chat.</p>
                        )}
                      </div>
                    </div>
                  )}

                </div>
              ) : (
                // Right panel default empty illustration page
                <div className="flex-1 flex flex-col items-center justify-center bg-waChatBg text-center px-6 relative wa-chat-pattern select-none">
                  <div className="flex flex-col items-center max-w-md">
                    {/* Centered Green WhatsApp Logo */}
                    <div className="w-20 h-20 bg-waAccent bg-opacity-15 rounded-full flex items-center justify-center text-waAccent text-5xl mb-6">
                      💬
                    </div>
                    <h2 className="text-xl md:text-2xl font-light text-waText mb-2.5">WhatsApp Web</h2>
                    <p className="text-sm text-waMuted leading-relaxed">
                      Send and receive messages without keeping your phone online. Use WhatsApp on up to 4 linked devices and 1 phone at the same time.
                    </p>
                  </div>
                  <div className="absolute bottom-10 flex items-center gap-1.5 text-xs text-waMuted">
                    <span>🔒</span> End-to-end encrypted
                  </div>
                </div>
              )}
            </div>

          </div>

          {/* --- STORY / STATUS VIEWER OVERLAY --- */}
          {activeStory && (
            <div className="fixed inset-0 bg-black z-50 flex items-center justify-center">
              <div className="w-full max-w-md h-full flex flex-col bg-black relative p-4 justify-between">
                
                {/* Horizontal progress bar indicators */}
                <div className="flex gap-1.5 w-full absolute top-4 left-0 px-4">
                  {statuses.find(s => s.id === activeStory.contactId).stories.map((story, idx) => (
                    <div key={idx} className="flex-1 h-1 bg-gray-600 rounded overflow-hidden">
                      <div
                        className="h-full bg-white transition-all ease-linear"
                        style={{
                          width: idx < activeStory.storyIndex 
                            ? '100%' 
                            : idx === activeStory.storyIndex 
                              ? `${storyProgress}%` 
                              : '0%'
                        }}
                      />
                    </div>
                  ))}
                </div>

                {/* Story Header */}
                <div className="flex justify-between items-center mt-4 text-white z-10">
                  <div className="flex items-center gap-3">
                    {renderAvatar(statuses.find(s => s.id === activeStory.contactId).avatar, statuses.find(s => s.id === activeStory.contactId).name, "w-9 h-9")}
                    <div>
                      <h4 className="font-semibold text-sm">{statuses.find(s => s.id === activeStory.contactId).name}</h4>
                      <p className="text-[10px] text-gray-400">{statuses.find(s => s.id === activeStory.contactId).time}</p>
                    </div>
                  </div>
                  <button onClick={() => setActiveStory(null)} className="hover:opacity-75">
                    <SvgIcon name="close" className="w-6 h-6 text-white" />
                  </button>
                </div>

                {/* Main Content Area */}
                <div className="flex-1 flex items-center justify-center my-6 relative select-none">
                  {/* Tap left/right to navigate */}
                  <div className="absolute inset-y-0 left-0 w-1/4 cursor-pointer" onClick={handlePrevStory} />
                  <div className="absolute inset-y-0 right-0 w-1/4 cursor-pointer" onClick={handleNextStory} />
                  
                  {statuses.find(s => s.id === activeStory.contactId).stories[activeStory.storyIndex].type === 'text' ? (
                    <div className={`p-8 text-center text-xl md:text-2xl font-medium text-white rounded-2xl w-full h-80 flex items-center justify-center shadow-lg ${
                      statuses.find(s => s.id === activeStory.contactId).stories[activeStory.storyIndex].bgColor
                    }`}>
                      {statuses.find(s => s.id === activeStory.contactId).stories[activeStory.storyIndex].text}
                    </div>
                  ) : (
                    <img 
                      src={statuses.find(s => s.id === activeStory.contactId).stories[activeStory.storyIndex].mediaUrl} 
                      className="max-h-[70vh] rounded-lg object-contain shadow-2xl" 
                    />
                  )}
                </div>

                {/* Quick reply footer */}
                <div className="mb-4">
                  <div className="bg-waInput border border-waBorder rounded-lg flex items-center px-4 py-2 gap-3">
                    <input
                      type="text"
                      placeholder="Type a reply..."
                      className="bg-transparent border-none text-sm text-waText outline-none w-full placeholder-waMuted"
                      onKeyDown={(e) => {
                        if (e.key === 'Enter' && e.target.value.trim()) {
                          addToast(`Replied to ${statuses.find(s => s.id === activeStory.contactId).name}'s status`);
                          setActiveStory(null);
                        }
                      }}
                    />
                  </div>
                </div>

              </div>
            </div>
          )}


          {/* --- STATUS TEXT COMPOSER MODAL --- */}
          {statusComposerOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center p-4">
              <div className="bg-waSidebar border border-waBorder rounded-xl w-full max-w-md p-5 flex flex-col gap-4 shadow-2xl">
                <div className="flex justify-between items-center text-waText">
                  <h3 className="font-semibold text-lg">Create Status</h3>
                  <button onClick={() => setStatusComposerOpen(false)} className="p-1 hover:bg-waHover rounded">
                    <SvgIcon name="close" className="w-5 h-5" />
                  </button>
                </div>
                
                <div className={`w-full h-44 rounded-lg flex items-center justify-center p-4 shadow-inner ${composerBg}`}>
                  <textarea
                    placeholder="Type your status..."
                    className="bg-transparent border-none outline-none text-white text-center font-semibold text-lg md:text-xl w-full h-full resize-none flex items-center justify-center overflow-hidden placeholder-white placeholder-opacity-60"
                    value={composerText}
                    onChange={(e) => setComposerText(e.target.value)}
                  />
                </div>

                <div className="flex justify-between items-center">
                  {/* Background cycle button */}
                  <div className="flex gap-2">
                    {['bg-purple-700', 'bg-teal-700', 'bg-red-700', 'bg-blue-700', 'bg-yellow-700'].map((bg) => (
                      <button
                        key={bg}
                        className={`w-6 h-6 rounded-full border ${bg} ${composerBg === bg ? 'border-white' : 'border-transparent'}`}
                        onClick={() => setComposerBg(bg)}
                      />
                    ))}
                  </div>
                  <button
                    className="bg-waAccent text-waBg font-bold px-4 py-1.5 rounded-full text-sm hover:scale-105 active:scale-95 transition-all shadow"
                    onClick={handlePostStatus}
                  >
                    Post Status
                  </button>
                </div>
              </div>
            </div>
          )}


          {/* --- SIMULATED CALL SCREEN OVERLAY --- */}
          {activeCall && (
            <div className="fixed inset-0 bg-waBg bg-opacity-95 z-[55] flex flex-col items-center justify-between py-12 px-6 animate-pop-in">
              <div className="flex flex-col items-center text-center mt-12 gap-4">
                {renderAvatar(activeCall.avatar, activeCall.name, "w-24 h-24 border-2 border-waAccent animate-pulse")}
                <div>
                  <h2 className="text-2xl font-bold text-waText">{activeCall.name}</h2>
                  <p className="text-sm text-waAccent font-semibold mt-1.5">{activeCall.status}</p>
                </div>
              </div>

              {/* Call timing details */}
              {activeCall.status === 'Connected' && (
                <div className="text-3xl font-mono text-white tracking-widest">
                  {Math.floor(callTime / 60)}:{callTime % 60 < 10 ? '0' : ''}{callTime % 60}
                </div>
              )}

              {/* Action Buttons */}
              <div className="flex items-center gap-6 mb-8">
                <button className="w-12 h-12 bg-waHover text-waText rounded-full flex items-center justify-center hover:opacity-90 active:scale-95 transition-all">
                  🔇
                </button>
                <button className="w-12 h-12 bg-waHover text-waText rounded-full flex items-center justify-center hover:opacity-90 active:scale-95 transition-all">
                  🔊
                </button>
                <button
                  onClick={handleHangUp}
                  className="w-14 h-14 bg-red-600 text-white rounded-full flex items-center justify-center hover:bg-red-700 shadow-lg hover:scale-105 active:scale-95 transition-all text-xl"
                >
                  📞
                </button>
              </div>
            </div>
          )}


          {/* --- POLL MODAL BUILDER --- */}
          {pollModalOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center p-4">
              <div className="bg-waSidebar border border-waBorder rounded-xl w-full max-w-md p-5 flex flex-col gap-4 shadow-2xl">
                <div className="flex justify-between items-center text-waText">
                  <h3 className="font-semibold text-lg">Create Poll</h3>
                  <button onClick={() => setPollModalOpen(false)} className="p-1 hover:bg-waHover rounded">
                    <SvgIcon name="close" className="w-5 h-5" />
                  </button>
                </div>

                <div className="flex flex-col gap-3">
                  <input
                    type="text"
                    placeholder="Ask question"
                    className="bg-waInput border border-waBorder rounded-lg p-2 text-sm text-waText outline-none w-full placeholder-waMuted"
                    value={pollQuestion}
                    onChange={(e) => setPollQuestion(e.target.value)}
                  />

                  <div className="flex flex-col gap-2">
                    {pollOptions.map((opt, idx) => (
                      <input
                        key={idx}
                        type="text"
                        placeholder={`Option ${idx + 1}`}
                        className="bg-waInput border border-waBorder rounded-lg p-2 text-sm text-waText outline-none w-full placeholder-waMuted"
                        value={opt}
                        onChange={(e) => {
                          const updated = [...pollOptions];
                          updated[idx] = e.target.value;
                          setPollOptions(updated);
                        }}
                      />
                    ))}
                    <button
                      className="text-xs text-waAccent font-bold self-start mt-1 hover:underline"
                      onClick={() => setPollOptions([...pollOptions, ''])}
                    >
                      + Add Option
                    </button>
                  </div>
                </div>

                <button
                  className="w-full bg-waAccent hover:bg-opacity-95 text-waBg py-2 rounded-lg font-bold text-sm transition-all"
                  onClick={() => {
                    if (!pollQuestion.trim() || pollOptions.filter(o => o.trim()).length < 2) {
                      alert('Please specify a question and at least 2 options.');
                      return;
                    }
                    handleSendMessage({
                      type: 'poll',
                      pollQuestion,
                      pollOptions: pollOptions.filter(o => o.trim()),
                      votes: {}
                    });
                    setPollQuestion('');
                    setPollOptions(['', '']);
                    setPollModalOpen(false);
                    addToast('Poll shared!');
                  }}
                >
                  Create and Send Poll
                </button>
              </div>
            </div>
          )}


          {/* --- NEW GROUP MODAL --- */}
          {newGroupModal && (
            <div className="fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center p-4">
              <div className="bg-waSidebar border border-waBorder rounded-xl w-full max-w-md p-5 flex flex-col gap-4 shadow-2xl">
                <div className="flex justify-between items-center text-waText">
                  <h3 className="font-semibold text-lg">Create New Group</h3>
                  <button onClick={() => setNewGroupModal(false)} className="p-1 hover:bg-waHover rounded">
                    <SvgIcon name="close" className="w-5 h-5" />
                  </button>
                </div>

                <div className="flex flex-col gap-3">
                  <input
                    type="text"
                    placeholder="Enter Group Name"
                    className="bg-waInput border border-waBorder rounded-lg p-2.5 text-sm text-waText outline-none w-full placeholder-waMuted"
                    value={groupNameInput}
                    onChange={(e) => setGroupNameInput(e.target.value)}
                  />

                  <div>
                    <h4 className="text-xs text-waMuted font-bold mb-2 uppercase">Select Group Members</h4>
                    <div className="flex flex-col gap-2 max-h-48 overflow-y-auto bg-waHeader border border-waBorder rounded-lg p-2">
                      {INITIAL_CHATS.map((c) => {
                        const isSelected = selectedContacts.some(sc => sc.id === c.id);
                        return (
                          <div
                            key={c.id}
                            className={`flex items-center justify-between p-1.5 rounded cursor-pointer ${
                              isSelected ? 'bg-waAccent bg-opacity-10' : 'hover:bg-waHover'
                            }`}
                            onClick={() => {
                              if (isSelected) {
                                setSelectedContacts(prev => prev.filter(sc => sc.id !== c.id));
                              } else {
                                setSelectedContacts(prev => [...prev, c]);
                              }
                            }}
                          >
                            <div className="flex items-center gap-2">
                              {renderAvatar(c.avatar, c.name, "w-8 h-8")}
                              <span className="text-sm font-medium">{c.name}</span>
                            </div>
                            <span className={`w-3.5 h-3.5 rounded border border-waAccent flex items-center justify-center ${isSelected ? 'bg-waAccent' : ''}`} />
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>

                <button
                  className="w-full bg-waAccent hover:bg-opacity-95 text-waBg py-2.5 rounded-lg font-bold text-sm transition-all"
                  onClick={handleCreateGroup}
                >
                  Create Group Chat
                </button>
              </div>
            </div>
          )}


          {/* --- IMAGE LIGHTBOX VIEWER --- */}
          {lightboxImage && (
            <div className="fixed inset-0 bg-black bg-opacity-95 z-[55] flex flex-col items-center justify-center p-4" onClick={() => setLightboxImage(null)}>
              <button className="absolute top-4 right-4 text-white hover:opacity-80 p-2 bg-black bg-opacity-40 rounded-full">
                ✕
              </button>
              <img src={lightboxImage} className="max-w-full max-h-[85vh] rounded-lg shadow-2xl object-contain animate-pop-in" onClick={(e) => e.stopPropagation()} />
            </div>
          )}


          {/* --- CHAT ITEM CONTEXT MENU --- */}
          {chatContextMenu && (
            <div
              className="fixed bg-waSidebar border border-waBorder rounded-lg p-1.5 shadow-2xl z-[55] w-40 text-sm animate-pop-in font-medium"
              style={{ top: `${chatContextMenu.y}px`, left: `${chatContextMenu.x}px` }}
              onClick={(e) => e.stopPropagation()}
            >
              <button className="w-full p-2 text-left hover:bg-waHover rounded" onClick={() => handleChatAction('pin', chatContextMenu.chatId)}>
                Pin Chat
              </button>
              <button className="w-full p-2 text-left hover:bg-waHover rounded" onClick={() => handleChatAction('mute', chatContextMenu.chatId)}>
                Mute Notifications
              </button>
              <button className="w-full p-2 text-left hover:bg-waHover rounded" onClick={() => handleChatAction('unread', chatContextMenu.chatId)}>
                Mark as read/unread
              </button>
              <div className="h-px bg-waBorder my-1" />
              <button className="w-full p-2 text-left text-red-500 hover:bg-waHover rounded" onClick={() => handleChatAction('delete', chatContextMenu.chatId)}>
                Delete Chat
              </button>
            </div>
          )}


          {/* --- MESSAGE ITEM CONTEXT MENU --- */}
          {messageContextMenu && (
            <div
              className="fixed bg-waSidebar border border-waBorder rounded-lg p-2 shadow-2xl z-[55] w-48 text-sm animate-pop-in font-medium flex flex-col gap-1"
              style={{ top: `${messageContextMenu.y}px`, left: `${messageContextMenu.x}px` }}
              onClick={(e) => e.stopPropagation()}
            >
              {/* Emojis row */}
              <div className="flex gap-2.5 border-b border-waBorder pb-2 mb-1 px-1 justify-center text-lg select-none">
                {['👍', '❤️', '😂', '😮', '😢', '🙏'].map((emoji) => (
                  <span
                    key={emoji}
                    className="cursor-pointer hover:scale-125 transition-transform"
                    onClick={() => handleReactToMessage(messageContextMenu.messageId, emoji)}
                  >
                    {emoji}
                  </span>
                ))}
              </div>

              <button className="w-full p-1.5 text-left hover:bg-waHover rounded flex items-center gap-2" onClick={() => {
                const msg = activeChat.messages.find(m => m.id === messageContextMenu.messageId);
                handleCopyMessage(msg.text);
              }}>
                Copy text
              </button>

              <button className="w-full p-1.5 text-left hover:bg-waHover rounded flex items-center gap-2" onClick={() => {
                handleStarMessage(messageContextMenu.messageId);
              }}>
                Star Message
              </button>

              <button className="w-full p-1.5 text-left hover:bg-waHover rounded flex items-center gap-2" onClick={() => {
                const targetMsg = activeChat.messages.find(m => m.id === messageContextMenu.messageId);
                // Trigger Reply Mockup
                setReplyingMessage(targetMsg);
                setInputText(prev => `[Reply to ${targetMsg.senderName}]: `);
                setMessageContextMenu(null);
              }}>
                Reply
              </button>

              <div className="h-px bg-waBorder my-1" />

              <button className="w-full p-1.5 text-left text-red-500 hover:bg-waHover rounded flex items-center gap-2" onClick={() => {
                handleDeleteMessage(messageContextMenu.messageId, true);
              }}>
                Delete for Everyone
              </button>

              <button className="w-full p-1.5 text-left hover:bg-waHover rounded flex items-center gap-2" onClick={() => {
                handleEditMessage(messageContextMenu.messageId);
              }}>
                Edit Message
              </button>

              <button className="w-full p-1.5 text-left text-red-500 hover:bg-waHover rounded flex items-center gap-2" onClick={() => {
                handleDeleteMessageCompletely(messageContextMenu.messageId);
              }}>
                Delete Completely
              </button>
            </div>
          )}


          {/* --- HACKING SIMULATION MODAL POPUP --- */}
          {hackingAlertOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-70 z-[100] flex items-center justify-center p-4" onClick={() => setHackingAlertOpen(false)}>
              <div className="relative bg-black border-2 border-[#00FF00] rounded-xl w-full max-w-md p-6 flex flex-col gap-4 shadow-[0_0_20px_rgba(0,255,0,0.6)] font-mono text-[#00FF00] animate-pop-in" onClick={(e) => e.stopPropagation()}>
                <button 
                  onClick={() => setHackingAlertOpen(false)} 
                  className="absolute top-3 right-4 text-[#00FF00] hover:text-white transition-colors text-sm font-bold select-none cursor-pointer"
                  title="Close Alert"
                >
                  ✕
                </button>
                <div className="text-center font-bold text-lg tracking-widest border-b border-[#00FF00] pb-2.5 animate-pulse">
                  [ SYSTEM ALERT ]
                </div>
                <div className="flex flex-col gap-2.5 text-xs">
                  <p className="text-center font-semibold border border-[#00FF00] px-2 py-1 bg-[#001100]">
                    AUTHORIZED TESTING ONLY
                  </p>
                  <p className="text-red-500 font-bold text-center animate-pulse">
                    UNAUTHORIZED ACCESS = LOGGED
                  </p>
                  
                  <div className="h-px bg-[#00FF00] bg-opacity-30 my-1" />
                  
                  <div className="flex flex-col gap-1.5 text-[12.5px]">
                    <p className="flex items-center gap-1.5">
                      <span className="w-1.5 h-1.5 rounded-full bg-[#00ff00] animate-ping inline-block" />
                      <span>MONITORING ACTIVE...</span>
                    </p>
                    <p className="flex justify-between">
                      <span>⚡ ACTION:</span>
                      <span className="font-bold">OTP BYPASS</span>
                    </p>
                    <p className="flex justify-between">
                      <span>⚡ TARGET:</span>
                      <span className="font-bold">SESSION HAIJACKING</span>
                    </p>
                  </div>
                  
                  <div className="h-px bg-[#00FF00] bg-opacity-30 my-1" />
                  
                  <div className="pl-3 border-l-2 border-[#00FF00] flex flex-col gap-1 text-[11.5px] text-opacity-90">
                    <p>• IP Logging - 893.879.45</p>
                    <p>• Device Tracking - ANDROID</p>
                    <p>• Auto Session Termination</p>
                    <p>• Security Alerts</p>
                  </div>
                </div>
              </div>
            </div>
          )}


          {/* --- FLOATING TOAST NOTIFICATIONS --- */}
          <div className="fixed bottom-6 left-6 z-[55] flex flex-col gap-2">
            {toasts.map((t) => (
              <div key={t.id} className="bg-waHeader border border-waBorder text-waText text-xs font-semibold px-4 py-2.5 rounded-lg shadow-2xl flex items-center gap-2 animate-pop-in">
                <span>🔔</span> {t.message}
              </div>
            ))}
          </div>

        </div>
      );
    }

    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
